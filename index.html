<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BMI Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
            background-color: #f0f4f8;
        }
        h1 { color: #2c3e50; }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            padding: 10px 30px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #2980b9; }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
        #category {
            font-size: 16px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <h1>BMI Calculator</h1>
    <input id="weight" type="number" placeholder="Weight (kg)">
    <input id="height" type="number" placeholder="Height (cm)">
    <br>
    <button onclick="calculate()">Calculate BMI</button>
    <p id="result"></p>
    <p id="category"></p>

    <script>
        async function calculate() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);

            if (!weight || !height) {
                document.getElementById('result').innerText = "Please enter valid values!";
                return;
            }

            const functionUrl = "BURAYA_SONRA_URL_GELECEK";

            const response = await fetch(functionUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ weight, height })
            });
            const data = await response.json();
            document.getElementById('result').innerText = "BMI: " + data.bmi;
            document.getElementById('category').innerText = "Category: " + data.category;
        }
    </script>
</body>
</html>
